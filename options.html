<!DOCTYPE html>
<html>
<head>
  <title>AI Auto Comment Settings</title>
  <style>
    body { width: 320px; padding: 15px; font-family: Arial; }
    label { font-weight: bold; display: block; margin-top: 10px; }
    input, button { width: 100%; margin-top: 5px; padding: 8px; box-sizing: border-box; }
    button { margin-top: 15px; background: #1877f2; color: white; border: none; cursor: pointer; }
    .status { margin-top: 10px; color: green; font-size: 0.9em; }
    .info { font-size: 0.8em; color: #555; margin-top: 5px; }
  </style>
</head>
<body>
  <h3>Gemini Configuration</h3>
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="Your Gemini API key">
  <div class="info">Lấy key tại <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a></div>

  <label>Model Name</label>
  <input type="text" id="modelName" placeholder="gemini-2.0-flash-exp" value="gemini-2.0-flash-exp">
  <div class="info">Có thể dùng gemini-1.5-flash, gemini-2.0-flash-exp, v.v.</div>

  <button id="save">Save</button>
  <div id="status" class="status"></div>
</body>
<script src="options.js"></script>
</html>
